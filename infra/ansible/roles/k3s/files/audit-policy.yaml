apiVersion: audit.k8s.io/v1
kind: Policy
omitStages:
  - RequestReceived
rules:
  - level: Metadata
    resources:
      - group: ""
        resources:
          - secrets
  - level: RequestResponse
    resources:
      - group: ""
        resources:
          - namespaces
          - persistentvolumeclaims
      - group: apps
        resources:
          - statefulsets
  - level: Metadata
