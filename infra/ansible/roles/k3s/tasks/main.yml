---
- name: Validate K3s and off-host snapshot inputs
  ansible.builtin.assert:
    that:
      - ansible_architecture == "x86_64"
      - private_node_ip | length > 0
      - k3s_server_token | length >= 32
      - k3s_etcd_s3_endpoint | length > 0
      - k3s_etcd_s3_region | length > 0
      - k3s_etcd_s3_bucket | length > 0
      - k3s_etcd_s3_access_key | length > 0
      - k3s_etcd_s3_secret_key | length > 0
    fail_msg: Pinned x86 K3s and complete encrypted snapshot credentials are required.
  no_log: true

- name: Create K3s configuration and audit directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: /etc/rancher/k3s
      group: exomem-operators
      mode: "0750"
    - path: /var/lib/rancher/k3s/server/logs
      group: root
      mode: "0700"

- name: Install required K3s kernel settings
  ansible.builtin.copy:
    src: 99-exomem-k3s.conf
    dest: /etc/sysctl.d/99-exomem-k3s.conf
    owner: root
    group: root
    mode: "0644"
  notify: Apply K3s kernel settings

- name: Download the pinned K3s binary with checksum verification
  ansible.builtin.get_url:
    url: "{{ k3s_release_url_amd64 }}"
    dest: /usr/local/bin/k3s
    owner: root
    group: root
    mode: "0755"
    checksum: "sha256:{{ k3s_sha256_amd64 }}"
    force: false
  notify: Restart K3s

- name: Install the Kubernetes audit policy
  ansible.builtin.copy:
    src: audit-policy.yaml
    dest: /etc/rancher/k3s/audit-policy.yaml
    owner: root
    group: root
    mode: "0600"
  notify: Restart K3s

- name: Install the K3s server configuration
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/rancher/k3s/config.yaml
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart K3s

- name: Install the K3s systemd unit
  ansible.builtin.template:
    src: k3s.service.j2
    dest: /etc/systemd/system/k3s.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart K3s

- name: Apply configuration handlers before first K3s start
  ansible.builtin.meta: flush_handlers

- name: Enable and start K3s
  ansible.builtin.systemd_service:
    name: k3s
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for the local Kubernetes API readiness endpoint
  ansible.builtin.command:
    argv:
      - /usr/local/bin/k3s
      - kubectl
      - get
      - --raw=/readyz
  register: k3s_ready
  changed_when: false
  retries: 30
  delay: 2
  until: k3s_ready.rc == 0 and k3s_ready.stdout == "ok"
