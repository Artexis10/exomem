traefik:
  image:
    registry: docker.io
    repository: traefik
    digest: sha256:21a3d83696379bac6434bb32e1dde0aff0e84ef2abd053ed3db87d3f45e749b2
  versionOverride: v3.7.6
  deployment:
    replicas: 1
    labels:
      exomem.io/ingress: traefik
    podLabels:
      exomem.io/ingress: traefik
  service:
    type: ClusterIP
  ports:
    web:
      port: 8000
      exposedPort: 80
    websecure:
      expose:
        default: false
  providers:
    kubernetesCRD:
      enabled: true
      allowCrossNamespace: false
    kubernetesIngress:
      enabled: false
  accessLog:
    enabled: false
