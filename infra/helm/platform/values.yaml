cloudflared:
  image: docker.io/cloudflare/cloudflared:2026.7.0@sha256:5e49861633763e8933475477c20bae6039ed47f32c1d267a34babc347f28f0df
  replicas: 1
  tokenSecretName: exomem-cloudflared-token
  tokenSecretKey: token

provisioner:
  image: ""
  replicas: 1
  databaseSchema: exomem_provisioner
  databaseRole: exomem_provisioner_runtime
  trustedProxyIps: 10.0.0.0/8
  cellChartPath: /opt/exomem/charts/cell
  cellChartVersion: 0.1.0
  helmBinary: /opt/exomem/bin/helm
  helmVersion: 3.19.4
  controlHostname: ""
  transferHostname: ""
  browserOrigin: https://substratesystems.io
  releaseManifestJson: ""
  location: fsn1
  internalOrigin: http://{resource}.{namespace}.svc.cluster.local:8765
  pollSeconds: "1"
  providerRecoveryPublicKeySecret:
    name: exomem-provider-recovery-verifier
    key: public-key
  providerRecoverySigningKeySecret:
    name: exomem-provider-recovery-signer
    key: private-key

admission:
  namespaceContractOperatorUsernames:
    - system:admin

scheduler:
  contractVersion: 1
  contractSha256: 02c1b9fa8d031ed77df9015f8555cfc95545b266767474aa52a8ccf08f4b40fc
  secretName: exomem-hosted-scheduler
  secretKey: secret

observability:
  contractSha256: cd576fd9012557787d8c740e96fdafdbfc851cf6a818207ec128731e8d732ad0
  alertDeliverySecretName: exomem-hosted-alert-delivery
  alertDeliverySecretKey: url

capacityCollector:
  schedule: "* * * * *"
  contractSha256: 1ff4737fa940bffefddd260d02b0a67f0bdffbcf56ec26e40264ee21895f9598
  stateConfigMap: exomem-capacity-receipt
  privateKeySecret:
    name: exomem-capacity-receipt-signer
    key: private-key
  hcloudTokenSecret:
    name: exomem-hcloud-capacity-reader
    key: token

durability:
  contractSha256: 81cdcfe87a8950a561a76751df61ad8ac3cafd1deefa7d4fdf522bb402ef03be
  storageContractSha256: 68e26665af9a48c831c975bc96afb03fbf47e229f89a3c13bc852809787de0f5
  b2Endpoint: ""
  b2Region: ""
  recoveryBucket: ""
  userExportBucket: ""
  databaseBackupBucket: ""
  databaseBackup:
    proofTenantId: ""
    proofCellId: ""
    sourceService: substrate-production
    maintenanceService: postgres-maintenance
    scratchService: exomem-restore-verification
    scratchDatabase: exomem_restore_verification
    expectedRestoreOwner: substrate
    verificationSql: >-
      SELECT current_user,
      current_setting('app.restore_tenant_id', true),
      current_setting('app.restore_cell_id', true)

storage:
  className: exomem-hcloud-encrypted-retain
  encryptionSecretName: exomem-volume-encryption
  encryptionSecretNamespace: exomem-platform

hcloud-csi:
  storageClasses: []
  controller:
    hcloudToken:
      value: ""
      existingSecret:
        name: exomem-hcloud-csi-token
        key: token
    hcloudVolumeDefaultLocation: fsn1
    image:
      hcloudCSIDriver:
        name: docker.io/hetznercloud/hcloud-csi-driver
        tag: v2.21.1@sha256:79b979d2fc7b46fdddab19e619c65faa201d0d76080765f0ec4b1969e0abe33f
        pullPolicy: IfNotPresent
  node:
    image:
      hcloudCSIDriver:
        name: docker.io/hetznercloud/hcloud-csi-driver
        tag: v2.21.1@sha256:79b979d2fc7b46fdddab19e619c65faa201d0d76080765f0ec4b1969e0abe33f
        pullPolicy: IfNotPresent

traefik:
  image:
    registry: docker.io
    repository: traefik
    digest: sha256:21a3d83696379bac6434bb32e1dde0aff0e84ef2abd053ed3db87d3f45e749b2
  versionOverride: v3.7.6
  deployment:
    replicas: 1
    labels:
      exomem.io/ingress: traefik
    podLabels:
      exomem.io/ingress: traefik
  service:
    type: ClusterIP
  ports:
    web:
      port: 8000
      exposedPort: 80
    websecure:
      expose:
        default: false
  providers:
    kubernetesCRD:
      enabled: true
      allowCrossNamespace: false
    kubernetesIngress:
      enabled: false
  accessLog:
    enabled: false
