{{- $release := include "exomem.hostedReleaseJson" . | mustFromJson -}}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: exomem-provisioner-scope
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["", "apps", "batch", "coordination.k8s.io", "networking.k8s.io", "traefik.io"]
        apiVersions: ["*"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["*"]
        scope: "*"
  matchConditions:
    - name: provisioner-service-account
      expression: >-
        request.userInfo.username ==
        'system:serviceaccount:{{ .Release.Namespace }}:exomem-cell-provisioner'
  variables:
    - name: target
      expression: >-
        request.operation == 'DELETE' ? dyn(oldObject) : dyn(object)
    - name: name
      expression: variables.target.metadata.name
    - name: labels
      expression: >-
        has(variables.target.metadata.labels) ? variables.target.metadata.labels : {}
    - name: annotations
      expression: >-
        has(variables.target.metadata.annotations) ? variables.target.metadata.annotations : {}
    - name: helmRelease
      expression: >-
        request.resource.resource == 'configmaps' &&
        variables.name.matches('^sh\\.helm\\.release\\.v1\\.' +
          request.namespace + '\\.v[1-9][0-9]*$')
  validations:
    - expression: >-
        request.resource.resource == 'namespaces'
          ? (request.operation == 'DELETE'
              ? oldObject.metadata.name.startsWith('exo-')
              : object.metadata.name.startsWith('exo-'))
          : (request.namespace.startsWith('exo-') &&
              (request.resource.resource != 'secrets' ||
                (request.operation == 'DELETE'
                  ? oldObject.metadata.name == 'exomem-cell-credentials'
                  : object.metadata.name == 'exomem-cell-credentials')))
      message: The hosted provisioner may mutate only fixed resources in opaque exo-* tenant namespaces.
    - expression: >-
        request.resource.resource in [
          'namespaces', 'configmaps', 'limitranges', 'persistentvolumeclaims',
          'resourcequotas', 'serviceaccounts', 'services', 'secrets', 'leases',
          'statefulsets', 'statefulsets/scale', 'jobs', 'networkpolicies',
          'ingressroutes', 'middlewares'
        ]
      message: The hosted provisioner may mutate only the fixed cell resource kinds.
    - expression: >-
        request.resource.resource == 'namespaces' ||
        (request.namespace.startsWith('exo-') &&
          (
            (request.resource.resource == 'configmaps' &&
              (variables.name == request.namespace + '-init-request' ||
                variables.name.matches('^exo-op-[a-f0-9]{20}$') ||
                variables.helmRelease)) ||
            (request.resource.resource == 'limitranges' &&
              variables.name == request.namespace + '-limits') ||
            (request.resource.resource == 'persistentvolumeclaims' &&
              variables.name == request.namespace + '-data') ||
            (request.resource.resource == 'resourcequotas' &&
              variables.name == request.namespace + '-quota') ||
            (request.resource.resource == 'serviceaccounts' &&
              variables.name == request.namespace) ||
            (request.resource.resource == 'services' &&
              variables.name == request.namespace) ||
            (request.resource.resource == 'secrets' &&
              variables.name == 'exomem-cell-credentials') ||
            (request.resource.resource == 'leases' &&
              variables.name == request.namespace + '-maintenance') ||
            (request.resource.resource in ['statefulsets', 'statefulsets/scale'] &&
              variables.name == request.namespace) ||
            (request.resource.resource == 'jobs' &&
              variables.name == request.namespace + '-init') ||
            (request.resource.resource == 'networkpolicies' &&
              variables.name in [request.namespace + '-default-deny',
                request.namespace + '-traefik-ingress']) ||
            (request.resource.resource == 'ingressroutes' &&
              variables.name in [request.namespace + '-control', request.namespace + '-transfer']) ||
            (request.resource.resource == 'middlewares' &&
              variables.name == request.namespace + '-strip-cell')
          ))
      message: The hosted provisioner may mutate only exact fixed names derived from the tenant namespace.
    - expression: >-
        request.resource.resource != 'namespaces' || request.operation == 'DELETE' ||
        (variables.labels['exomem.io/tenant-cell'] == 'true' &&
          variables.labels['exomem.io/cell-resource'] ==
            variables.annotations['exomem.io/resource-name'] &&
          variables.labels['pod-security.kubernetes.io/enforce'] == 'restricted' &&
          variables.labels['pod-security.kubernetes.io/enforce-version'] == 'v1.35' &&
          variables.labels['pod-security.kubernetes.io/audit'] == 'restricted' &&
          variables.labels['pod-security.kubernetes.io/audit-version'] == 'v1.35' &&
          variables.labels['pod-security.kubernetes.io/warn'] == 'restricted' &&
          variables.labels['pod-security.kubernetes.io/warn-version'] == 'v1.35' &&
          variables.annotations['helm.sh/resource-policy'] == 'keep' &&
          variables.annotations['exomem.io/pvc-name'] ==
            variables.annotations['exomem.io/resource-name'] + '-data' &&
          variables.annotations['exomem.io/credentials-secret-name'] ==
            'exomem-cell-credentials' &&
          variables.annotations['exomem.io/init-request-configmap-name'] ==
            variables.annotations['exomem.io/resource-name'] + '-init-request' &&
          !('exomem.io/approved-image' in variables.annotations) &&
          'exomem.io/tenant-id' in variables.annotations &&
          'exomem.io/cell-id' in variables.annotations &&
          'exomem.io/operation-id' in variables.annotations &&
          'exomem.io/tenant-digest' in variables.annotations &&
          'exomem.io/subject-digest' in variables.annotations &&
          'exomem.io/operation-digest' in variables.annotations &&
          'exomem.io/fence' in variables.annotations &&
          'exomem.io/recovery-envelope' in variables.annotations)
      message: The hosted provisioner may mutate only the exact restricted tenant namespace contract.
    - expression: >-
        !variables.helmRelease ||
        (variables.labels['owner'] == 'helm' &&
          variables.labels['name'] == request.namespace &&
          variables.labels['status'] in [
            'pending-install', 'pending-upgrade', 'deployed', 'superseded', 'failed'
          ] &&
          variables.labels['version'].matches('^[1-9][0-9]*$') &&
          variables.name == 'sh.helm.release.v1.' + request.namespace +
            '.v' + variables.labels['version'] &&
          size(variables.target.data) == 1 &&
          'release' in variables.target.data &&
          variables.target.data['release'].size() > 0 &&
          variables.target.data['release'].size() <= 1048576)
      message: Helm state is limited to one bounded ConfigMap for this exact tenant release revision.
    - expression: >-
        !(request.resource.resource in [
          'persistentvolumeclaims', 'services', 'secrets', 'statefulsets', 'jobs',
          'networkpolicies', 'ingressroutes', 'middlewares'
        ]) ||
        (variables.labels['exomem.io/cell'] == request.namespace &&
          'exomem.io/tenant-id' in variables.annotations &&
          'exomem.io/cell-id' in variables.annotations &&
          'exomem.io/fence' in variables.annotations &&
          'exomem.io/recovery-envelope' in variables.annotations)
      message: Fixed tenant resources must carry their namespace-bound provider identity.
    - expression: >-
        request.resource.resource != 'persistentvolumeclaims' ||
        (variables.target.spec.accessModes == ['ReadWriteOnce'] &&
          variables.target.spec.volumeMode == 'Filesystem' &&
          variables.target.spec.storageClassName == 'exomem-hcloud-encrypted-retain' &&
          variables.target.spec.resources.requests.storage == quantity('10Gi'))
      message: The hosted provisioner may manage only the exact encrypted 10 GiB tenant PVC.
    - expression: >-
        request.resource.resource != 'services' || request.operation == 'DELETE' ||
        (variables.target.spec.type == 'ClusterIP' &&
          variables.target.spec.selector == {
            'app.kubernetes.io/name': 'exomem-cell',
            'exomem.io/cell': request.namespace
          } &&
          size(variables.target.spec.ports) == 1 &&
          variables.target.spec.ports[0].name == 'http' &&
          variables.target.spec.ports[0].port == 8765 &&
          variables.target.spec.ports[0].targetPort == 'http' &&
          variables.target.spec.ports[0].protocol == 'TCP')
      message: The hosted provisioner may manage only the exact private ClusterIP cell service.
    - expression: >-
        request.resource.resource != 'statefulsets' || request.operation == 'DELETE' ||
        (variables.target.spec.serviceName == request.namespace &&
          variables.target.spec.replicas in [0, 1] &&
          variables.target.spec.selector.matchLabels == {
            'app.kubernetes.io/name': 'exomem-cell',
            'exomem.io/cell': request.namespace
          } &&
          variables.target.spec.template.metadata.labels ==
            variables.target.spec.selector.matchLabels &&
          variables.target.spec.template.spec.serviceAccountName == request.namespace &&
          size(variables.target.spec.template.spec.containers) == 1 &&
          variables.target.spec.template.spec.containers[0].image == '{{ $release.runtimeImage }}')
      message: The hosted provisioner may manage only the exact pinned single-cell StatefulSet.
    - expression: >-
        request.resource.resource != 'networkpolicies' || request.operation != 'DELETE'
      message: NetworkPolicy deletion is reserved for namespace destruction.
    - expression: >-
        request.resource.resource != 'networkpolicies' || request.operation == 'DELETE' ||
        (variables.name == request.namespace + '-default-deny'
          ? (variables.target.spec.podSelector == {} &&
              variables.target.spec.policyTypes == ['Ingress', 'Egress'] &&
              !has(variables.target.spec.ingress) && !has(variables.target.spec.egress))
          : (variables.target.spec.podSelector.matchLabels == {
                'app.kubernetes.io/name': 'exomem-cell',
                'exomem.io/cell': request.namespace
              } &&
              variables.target.spec.policyTypes == ['Ingress'] &&
              size(variables.target.spec.ingress) == 2 &&
              size(variables.target.spec.ingress[0].from) == 1 &&
              variables.target.spec.ingress[0].from[0].namespaceSelector.matchLabels == {
                'kubernetes.io/metadata.name': '{{ .Release.Namespace }}'
              } &&
              variables.target.spec.ingress[0].from[0].podSelector.matchLabels == {
                'app.kubernetes.io/name': 'traefik',
                'exomem.io/ingress': 'traefik'
              } &&
              size(variables.target.spec.ingress[0].ports) == 1 &&
              variables.target.spec.ingress[0].ports[0].protocol == 'TCP' &&
              variables.target.spec.ingress[0].ports[0].port == 8765 &&
              size(variables.target.spec.ingress[1].from) == 1 &&
              variables.target.spec.ingress[1].from[0].namespaceSelector.matchLabels == {
                'kubernetes.io/metadata.name': '{{ .Release.Namespace }}'
              } &&
              variables.target.spec.ingress[1].from[0].podSelector.matchLabels == {
                'app.kubernetes.io/name': 'exomem-durability-actions'
              } &&
              size(variables.target.spec.ingress[1].ports) == 1 &&
              variables.target.spec.ingress[1].ports[0].protocol == 'TCP' &&
              variables.target.spec.ingress[1].ports[0].port == 8765 &&
              !has(variables.target.spec.egress)))
      message: The hosted provisioner may manage only the exact default-deny and platform ingress policies.
    - expression: >-
        request.resource.resource != 'middlewares' || request.operation == 'DELETE' ||
        (size(variables.target.spec.stripPrefix.prefixes) == 1 &&
          variables.target.spec.stripPrefix.prefixes[0] ==
            '/cells/' + variables.annotations['exomem.io/cell-id'])
      message: The hosted provisioner may manage only the exact cell path-stripping middleware.
    - expression: >-
        request.resource.resource != 'ingressroutes' || request.operation == 'DELETE' ||
        (variables.target.spec.entryPoints == ['web'] &&
          size(variables.target.spec.routes) == 1 &&
          variables.target.spec.routes[0].kind == 'Rule' &&
          size(variables.target.spec.routes[0].middlewares) == 1 &&
          variables.target.spec.routes[0].middlewares[0].name == request.namespace + '-strip-cell' &&
          size(variables.target.spec.routes[0].services) == 1 &&
          variables.target.spec.routes[0].services[0].name == request.namespace &&
          variables.target.spec.routes[0].services[0].port == 8765 &&
          (variables.name == request.namespace + '-control'
            ? variables.target.spec.routes[0].match ==
                'Host(`{{ .Values.provisioner.controlHostname }}`) && (Path(`/cells/' +
                variables.annotations['exomem.io/cell-id'] +
                '/private/exomem/v1`) || PathPrefix(`/cells/' +
                variables.annotations['exomem.io/cell-id'] + '/private/exomem/v1/`))'
            : variables.target.spec.routes[0].match ==
                'Host(`{{ .Values.provisioner.transferHostname }}`) && (Path(`/cells/' +
                variables.annotations['exomem.io/cell-id'] +
                '/public/exomem/v2/transfers/upload`) || Path(`/cells/' +
                variables.annotations['exomem.io/cell-id'] +
                '/public/exomem/v2/transfers/download`))'))
      message: The hosted provisioner may manage only exact private cell routes to the same namespace service.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: exomem-provisioner-scope
spec:
  policyName: exomem-provisioner-scope
  validationActions: [Deny]
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: exomem-durability-actions-scope
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["", "apps", "batch", "coordination.k8s.io", "networking.k8s.io", "traefik.io"]
        apiVersions: ["*"]
        operations: ["CREATE", "UPDATE", "DELETE"]
        resources: ["*"]
        scope: Namespaced
  matchConditions:
    - name: durability-actions-service-account
      expression: >-
        request.userInfo.username ==
        'system:serviceaccount:{{ .Release.Namespace }}:exomem-durability-actions'
  variables:
    - name: target
      expression: >-
        request.operation == 'DELETE' ? dyn(oldObject) : dyn(object)
    - name: name
      expression: variables.target.metadata.name
    - name: labels
      expression: >-
        has(variables.target.metadata.labels) ? variables.target.metadata.labels : {}
    - name: annotations
      expression: >-
        has(variables.target.metadata.annotations) ? variables.target.metadata.annotations : {}
    - name: resourceName
      expression: namespaceObject.metadata.annotations['exomem.io/resource-name']
    - name: restoreResource
      expression: >-
        (request.resource.resource == 'configmaps' &&
          variables.name.matches('^restore-[a-f0-9]{20}-request$')) ||
        (request.resource.resource == 'secrets' &&
          variables.name.matches('^restore-[a-f0-9]{20}-source$')) ||
        (request.resource.resource == 'networkpolicies' &&
          variables.name.matches('^restore-[a-f0-9]{20}-egress$')) ||
        (request.resource.resource == 'jobs' &&
          variables.name.matches('^restore-[a-f0-9]{20}$'))
    - name: restorePod
      expression: >-
        request.resource.resource == 'pods' &&
        'job-name' in variables.labels &&
        variables.labels['job-name'].matches('^restore-[a-f0-9]{20}$') &&
        variables.name.startsWith(variables.labels['job-name'] + '-') &&
        variables.name.size() == variables.labels['job-name'].size() + 6
    - name: helmRelease
      expression: >-
        request.resource.resource == 'configmaps' &&
        variables.name.matches('^sh\\.helm\\.release\\.v1\\.' +
          variables.resourceName + '\\.v[1-9][0-9]*$')
    - name: chartResource
      expression: >-
        (request.resource.resource == 'persistentvolumeclaims' &&
          variables.name == variables.resourceName + '-data') ||
        (request.resource.resource == 'limitranges' &&
          variables.name == variables.resourceName + '-limits') ||
        (request.resource.resource == 'resourcequotas' &&
          variables.name == variables.resourceName + '-quota') ||
        (request.resource.resource == 'serviceaccounts' &&
          variables.name == variables.resourceName) ||
        (request.resource.resource == 'services' &&
          variables.name == variables.resourceName) ||
        (request.resource.resource == 'statefulsets' &&
          variables.name == variables.resourceName) ||
        (request.resource.resource == 'networkpolicies' &&
          variables.name in [variables.resourceName + '-default-deny',
            variables.resourceName + '-traefik-ingress']) ||
        (request.resource.resource == 'ingressroutes' &&
          variables.name in [variables.resourceName + '-control',
            variables.resourceName + '-transfer']) ||
        (request.resource.resource == 'middlewares' &&
          variables.name == variables.resourceName + '-strip-cell')
  validations:
    - expression: >-
        has(namespaceObject.metadata.labels) &&
        namespaceObject.metadata.labels['exomem.io/tenant-cell'] == 'true' &&
        request.namespace.startsWith('exo-') &&
        has(namespaceObject.metadata.annotations) &&
        'exomem.io/resource-name' in namespaceObject.metadata.annotations &&
        'exomem.io/pvc-name' in namespaceObject.metadata.annotations &&
        'exomem.io/credentials-secret-name' in namespaceObject.metadata.annotations &&
        namespaceObject.metadata.annotations['exomem.io/credentials-secret-name'] ==
          'exomem-cell-credentials' &&
        'exomem.io/tenant-id' in namespaceObject.metadata.annotations &&
        'exomem.io/cell-id' in namespaceObject.metadata.annotations
      message: Durability actions may mutate only authenticated opaque tenant namespaces.
    - expression: >-
        (request.operation == 'CREATE' &&
          ((request.resource.resource == 'configmaps' &&
              (variables.name.matches('^restore-[a-f0-9]{20}-request$') ||
                variables.helmRelease)) ||
            (request.resource.resource == 'secrets' &&
              variables.name.matches('^restore-[a-f0-9]{20}-source$')) ||
            (request.resource.resource == 'networkpolicies' &&
              (variables.name.matches('^restore-[a-f0-9]{20}-egress$') ||
                variables.name == variables.resourceName + '-traefik-ingress')) ||
            (request.resource.resource == 'jobs' &&
              variables.name.matches('^restore-[a-f0-9]{20}$')) ||
            (request.resource.resource == 'leases' &&
              variables.name == variables.resourceName + '-maintenance') ||
            (request.resource.resource == 'services' &&
              variables.name == variables.resourceName) ||
            (request.resource.resource == 'statefulsets' &&
              variables.name == variables.resourceName) ||
            (request.resource.resource == 'ingressroutes' &&
              variables.name in [variables.resourceName + '-control',
                variables.resourceName + '-transfer']) ||
            (request.resource.resource == 'middlewares' &&
              variables.name == variables.resourceName + '-strip-cell'))) ||
        (request.operation == 'UPDATE' &&
          ((request.resource.resource == 'configmaps' && variables.helmRelease) ||
            (request.resource.resource in [
                'serviceaccounts', 'services', 'statefulsets', 'statefulsets/scale'
              ] &&
              variables.name == variables.resourceName) ||
            (request.resource.resource == 'persistentvolumeclaims' &&
              variables.name == variables.resourceName + '-data') ||
            (request.resource.resource == 'limitranges' &&
              variables.name == variables.resourceName + '-limits') ||
            (request.resource.resource == 'resourcequotas' &&
              variables.name == variables.resourceName + '-quota') ||
            (request.resource.resource == 'networkpolicies' &&
              variables.name in [variables.resourceName + '-default-deny',
                variables.resourceName + '-traefik-ingress']) ||
            (request.resource.resource == 'leases' &&
              variables.name == variables.resourceName + '-maintenance') ||
            (request.resource.resource == 'ingressroutes' &&
              variables.name in [variables.resourceName + '-control',
                variables.resourceName + '-transfer']) ||
            (request.resource.resource == 'middlewares' &&
              variables.name == variables.resourceName + '-strip-cell'))) ||
        (request.operation == 'DELETE' &&
          ((request.resource.resource == 'configmaps' &&
              (variables.name.matches('^restore-[a-f0-9]{20}-request$') ||
                variables.name == variables.resourceName + '-init-request' ||
                variables.helmRelease)) ||
            (request.resource.resource == 'secrets' &&
              variables.name.matches('^restore-[a-f0-9]{20}-source$')) ||
            (request.resource.resource == 'networkpolicies' &&
              (variables.name.matches('^restore-[a-f0-9]{20}-egress$') ||
                variables.name == variables.resourceName + '-traefik-ingress')) ||
            (request.resource.resource == 'jobs' &&
              (variables.name.matches('^restore-[a-f0-9]{20}$') ||
                variables.name == variables.resourceName + '-init')) ||
            (request.resource.resource in ['services', 'statefulsets'] &&
              variables.name == variables.resourceName) ||
            (request.resource.resource == 'pods' &&
              (variables.name == variables.resourceName + '-0' ||
                variables.restorePod)) ||
            (request.resource.resource == 'leases' &&
              variables.name == variables.resourceName + '-maintenance') ||
            (request.resource.resource == 'ingressroutes' &&
              variables.name in [variables.resourceName + '-control',
                variables.resourceName + '-transfer']) ||
            (request.resource.resource == 'middlewares' &&
              variables.name == variables.resourceName + '-strip-cell')))
      message: Durability actions may mutate only exact restore, maintenance, promotion, and route resources.
    - expression: >-
        !variables.chartResource ||
        (variables.labels['app.kubernetes.io/name'] == 'exomem-cell' &&
          variables.labels['exomem.io/cell'] == variables.resourceName &&
          variables.annotations['exomem.io/tenant-id'] ==
            namespaceObject.metadata.annotations['exomem.io/tenant-id'] &&
          variables.annotations['exomem.io/cell-id'] ==
            namespaceObject.metadata.annotations['exomem.io/cell-id'] &&
          'exomem.io/operation-id' in variables.annotations &&
          'exomem.io/operation-digest' in variables.annotations &&
          'exomem.io/fence' in variables.annotations &&
          'exomem.io/recovery-envelope' in variables.annotations)
      message: Helm reconciliation is limited to authenticated fixed cell-chart resources.
    - expression: >-
        !variables.helmRelease ||
        (variables.labels['owner'] == 'helm' &&
          variables.labels['name'] == variables.resourceName &&
          variables.labels['status'] in [
            'pending-install', 'pending-upgrade', 'deployed', 'superseded', 'failed'
          ] &&
          variables.labels['version'].matches('^[1-9][0-9]*$') &&
          variables.name == 'sh.helm.release.v1.' + variables.resourceName +
            '.v' + variables.labels['version'] &&
          size(variables.target.data) == 1 &&
          'release' in variables.target.data &&
          variables.target.data['release'].size() > 0 &&
          variables.target.data['release'].size() <= 1048576)
      message: Helm state is limited to one bounded ConfigMap for this exact tenant release revision.
    - expression: >-
        !variables.restoreResource ||
        (variables.labels['app.kubernetes.io/name'] == 'exomem-restore-candidate' &&
          variables.labels['exomem.io/cell'] == request.namespace &&
          variables.labels['exomem.io/restore-candidate'] == 'true' &&
          variables.labels['exomem.io/cell-id'] ==
            variables.annotations['exomem.io/cell-id'] &&
          variables.labels['exomem.io/operation-digest'].matches('^[a-f0-9]{32}$') &&
          variables.labels['exomem.io/fence'] == variables.annotations['exomem.io/fence'] &&
          variables.annotations['exomem.io/tenant-id'] ==
            namespaceObject.metadata.annotations['exomem.io/tenant-id'] &&
          variables.annotations['exomem.io/cell-id'] ==
            namespaceObject.metadata.annotations['exomem.io/cell-id'] &&
          variables.annotations['exomem.io/operation-id'].matches('^[A-Za-z0-9][A-Za-z0-9._:-]{0,255}$') &&
          variables.annotations['exomem.io/fence'].matches('^[1-9][0-9]{0,15}$') &&
          int(variables.annotations['exomem.io/fence']) <= 9007199254740991)
      message: Restore resources must carry the exact authenticated candidate identity.
    - expression: >-
        !variables.restorePod ||
        (variables.labels['app.kubernetes.io/name'] == 'exomem-restore-candidate' &&
          variables.labels['exomem.io/cell'] == request.namespace &&
          variables.labels['exomem.io/restore-candidate'] == 'true' &&
          variables.labels['exomem.io/cell-id'] ==
            namespaceObject.metadata.annotations['exomem.io/cell-id'] &&
          variables.labels['exomem.io/operation-digest'].matches('^[a-f0-9]{32}$') &&
          variables.labels['exomem.io/fence'].matches('^[1-9][0-9]{0,15}$') &&
          int(variables.labels['exomem.io/fence']) <= 9007199254740991)
      message: Restore Pod deletion is limited to the exact authenticated candidate Job Pod.
    - expression: >-
        request.resource.resource != 'configmaps' || request.operation == 'DELETE' ||
        variables.helmRelease ||
        (variables.restoreResource && variables.target.immutable == true &&
          size(variables.target.data) == 1 &&
          'restore-candidate.json' in variables.target.data &&
          variables.target.data['restore-candidate.json'].size() <= 65536 &&
          variables.annotations['exomem.io/restore-request-sha256'].matches('^[a-f0-9]{64}$'))
      message: Durability actions may create only one immutable bounded restore request ConfigMap.
    - expression: >-
        request.resource.resource != 'secrets' || request.operation == 'DELETE' ||
        (variables.target.type == 'Opaque' && variables.target.immutable == true &&
          has(variables.target.stringData) && size(variables.target.stringData) == 1 &&
          variables.target.stringData['url'].startsWith('https://') &&
          variables.target.stringData['url'].contains('?') &&
          variables.target.stringData['url'].size() <= 4096 &&
          variables.annotations['exomem.io/restore-source-sha256'].matches('^[a-f0-9]{64}$'))
      message: Durability actions may create only the immutable presigned restore-source Secret.
    - expression: >-
