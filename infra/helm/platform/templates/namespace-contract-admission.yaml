{{- $operatorUsernames := .Values.admission.namespaceContractOperatorUsernames | toJson -}}
{{- $protectedLabels := list "exomem.io/tenant-cell" "exomem.io/cell-resource" "pod-security.kubernetes.io/enforce" "pod-security.kubernetes.io/enforce-version" "pod-security.kubernetes.io/audit" "pod-security.kubernetes.io/audit-version" "pod-security.kubernetes.io/warn" "pod-security.kubernetes.io/warn-version" -}}
{{- $protectedAnnotations := list "helm.sh/resource-policy" "exomem.io/resource-name" "exomem.io/approved-image" "exomem.io/pvc-name" "exomem.io/credentials-secret-name" "exomem.io/init-request-configmap-name" "exomem.io/tenant-id" "exomem.io/cell-id" "exomem.io/operation-id" "exomem.io/tenant-digest" "exomem.io/subject-digest" "exomem.io/operation-digest" "exomem.io/fence" -}}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: exomem-tenant-namespace-contract
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["namespaces"]
  variables:
    - name: oldLabels
      expression: >-
        request.operation == 'UPDATE' && has(oldObject.metadata.labels) ? oldObject.metadata.labels : {}
    - name: newLabels
      expression: >-
        has(object.metadata.labels) ? object.metadata.labels : {}
    - name: oldAnnotations
      expression: >-
        request.operation == 'UPDATE' && has(oldObject.metadata.annotations) ? oldObject.metadata.annotations : {}
    - name: newAnnotations
      expression: >-
        has(object.metadata.annotations) ? object.metadata.annotations : {}
    - name: oldTenant
      expression: >-
        'exomem.io/tenant-cell' in variables.oldLabels &&
        variables.oldLabels['exomem.io/tenant-cell'] == 'true'
    - name: newTenant
      expression: >-
        'exomem.io/tenant-cell' in variables.newLabels &&
        variables.newLabels['exomem.io/tenant-cell'] == 'true'
  validations:
    - expression: >-
        !(variables.oldTenant || variables.newTenant) ||
        (
        variables.newTenant &&
        'exomem.io/cell-resource' in variables.newLabels &&
        'pod-security.kubernetes.io/enforce' in variables.newLabels &&
        variables.newLabels['pod-security.kubernetes.io/enforce'] == 'restricted' &&
        'pod-security.kubernetes.io/enforce-version' in variables.newLabels &&
        variables.newLabels['pod-security.kubernetes.io/enforce-version'] == 'v1.35' &&
        'pod-security.kubernetes.io/audit' in variables.newLabels &&
        variables.newLabels['pod-security.kubernetes.io/audit'] == 'restricted' &&
        'pod-security.kubernetes.io/audit-version' in variables.newLabels &&
        variables.newLabels['pod-security.kubernetes.io/audit-version'] == 'v1.35' &&
        'pod-security.kubernetes.io/warn' in variables.newLabels &&
        variables.newLabels['pod-security.kubernetes.io/warn'] == 'restricted' &&
        'pod-security.kubernetes.io/warn-version' in variables.newLabels &&
        variables.newLabels['pod-security.kubernetes.io/warn-version'] == 'v1.35' &&
        'helm.sh/resource-policy' in variables.newAnnotations &&
        variables.newAnnotations['helm.sh/resource-policy'] == 'keep' &&
        'exomem.io/resource-name' in variables.newAnnotations &&
        variables.newAnnotations['exomem.io/resource-name'].matches('^[a-z0-9][a-z0-9-]{2,62}$') &&
        variables.newLabels['exomem.io/cell-resource'] == variables.newAnnotations['exomem.io/resource-name'] &&
        'exomem.io/pvc-name' in variables.newAnnotations &&
        variables.newAnnotations['exomem.io/pvc-name'] == variables.newAnnotations['exomem.io/resource-name'] + '-data' &&
        'exomem.io/credentials-secret-name' in variables.newAnnotations &&
        variables.newAnnotations['exomem.io/credentials-secret-name'].matches('^[a-z0-9][a-z0-9-]{2,62}$') &&
        'exomem.io/init-request-configmap-name' in variables.newAnnotations &&
        variables.newAnnotations['exomem.io/init-request-configmap-name'] == variables.newAnnotations['exomem.io/resource-name'] + '-init-request' &&
        'exomem.io/tenant-id' in variables.newAnnotations &&
        variables.newAnnotations['exomem.io/tenant-id'].matches('^[A-Za-z0-9_.:/-]{1,256}$') &&
        'exomem.io/cell-id' in variables.newAnnotations &&
        variables.newAnnotations['exomem.io/cell-id'].matches('^[A-Za-z0-9_.:/-]{1,256}$') &&
        'exomem.io/operation-id' in variables.newAnnotations &&
        variables.newAnnotations['exomem.io/operation-id'].matches('^[A-Za-z0-9_.:/-]{1,256}$') &&
        'exomem.io/tenant-digest' in variables.newAnnotations &&
        variables.newAnnotations['exomem.io/tenant-digest'].matches('^[a-f0-9]{64}$') &&
        'exomem.io/subject-digest' in variables.newAnnotations &&
        variables.newAnnotations['exomem.io/subject-digest'].matches('^[a-f0-9]{64}$') &&
        'exomem.io/operation-digest' in variables.newAnnotations &&
        variables.newAnnotations['exomem.io/operation-digest'].matches('^[a-f0-9]{64}$') &&
        'exomem.io/fence' in variables.newAnnotations &&
        variables.newAnnotations['exomem.io/fence'].matches('^[1-9][0-9]{0,18}$')
        )
      message: Tenant namespaces must keep the exact restricted-v1.35 tenant namespace contract.
    - expression: >-
        request.operation != 'UPDATE' ||
        request.userInfo.username in {{ $operatorUsernames }} ||
        (
{{- range $field := $protectedLabels }}
        (('{{ $field }}' in variables.oldLabels) == ('{{ $field }}' in variables.newLabels) &&
          (!('{{ $field }}' in variables.oldLabels) || variables.oldLabels['{{ $field }}'] == variables.newLabels['{{ $field }}'])) &&
{{- end }}
{{- range $field := $protectedAnnotations }}
        (('{{ $field }}' in variables.oldAnnotations) == ('{{ $field }}' in variables.newAnnotations) &&
          (!('{{ $field }}' in variables.oldAnnotations) || variables.oldAnnotations['{{ $field }}'] == variables.newAnnotations['{{ $field }}'])) &&
{{- end }}
        true)
      message: Tenant namespace contract fields require platform operator authority.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: exomem-tenant-namespace-contract
spec:
  policyName: exomem-tenant-namespace-contract
  validationActions: [Deny]
