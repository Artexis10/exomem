apiVersion: apps/v1
kind: Deployment
metadata:
  name: exomem-deletion-worker
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: exomem-deletion-worker
    app.kubernetes.io/part-of: exomem-hosted-durability
spec:
  replicas: {{ $deletion.replicas }}
  strategy: {type: Recreate}
  selector:
    matchLabels: {app.kubernetes.io/name: exomem-deletion-worker}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: exomem-deletion-worker
        app.kubernetes.io/part-of: exomem-hosted-durability
    spec:
      serviceAccountName: {{ $deletion.serviceAccount }}
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: deletion-worker
          image: {{ .Values.provisioner.image }}
          imagePullPolicy: IfNotPresent
          command: {{ $deletion.command | toJson }}
          env:
            - name: EXOMEM_PROVISIONER_DATABASE_URL
              valueFrom:
                secretKeyRef: {name: exomem-provisioner-database, key: url}
            - name: EXOMEM_PROVISIONER_DATABASE_SCHEMA
              value: {{ .Values.provisioner.databaseSchema | quote }}
            - name: EXOMEM_PROVISIONER_DATABASE_ROLE
              value: {{ .Values.provisioner.databaseRole | quote }}
            - name: EXOMEM_PROVISIONER_ENVELOPE_KEY
              valueFrom:
                secretKeyRef: {name: exomem-provisioner-wrapping-key, key: key-material}
            - name: EXOMEM_PROVIDER_RECOVERY_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.provisioner.providerRecoveryPublicKeySecret.name }}
                  key: {{ .Values.provisioner.providerRecoveryPublicKeySecret.key }}
            - name: EXOMEM_PROVISIONER_HCLOUD_TOKEN
              valueFrom:
                secretKeyRef: {name: exomem-provisioner-hcloud-token, key: token}
            - name: EXOMEM_PROVISIONER_B2_ENDPOINT_URL
              valueFrom:
                configMapKeyRef: {name: exomem-durability-storage, key: s3-endpoint}
            - name: EXOMEM_PROVISIONER_B2_REGION
              valueFrom:
                configMapKeyRef: {name: exomem-durability-storage, key: s3-region}
            - name: EXOMEM_PROVISIONER_RECOVERY_BUCKET
              valueFrom:
                configMapKeyRef: {name: exomem-durability-storage, key: recovery-bucket}
            - name: EXOMEM_PROVISIONER_USER_EXPORT_BUCKET
              valueFrom:
                configMapKeyRef: {name: exomem-durability-storage, key: user-export-bucket}
            - name: EXOMEM_PROVISIONER_RECOVERY_DELETE_KEY_ID
              valueFrom:
                secretKeyRef: {name: exomem-recovery-delete-key-id, key: application-key-id}
            - name: EXOMEM_PROVISIONER_RECOVERY_DELETE_KEY
              valueFrom:
                secretKeyRef: {name: exomem-recovery-delete-key, key: application-key}
            - name: EXOMEM_PROVISIONER_USER_EXPORT_DELETE_KEY_ID
              valueFrom:
                secretKeyRef: {name: exomem-user-export-delete-key-id, key: application-key-id}
            - name: EXOMEM_PROVISIONER_USER_EXPORT_DELETE_KEY
              valueFrom:
                secretKeyRef: {name: exomem-user-export-delete-key, key: application-key}
            - name: EXOMEM_PROVISIONER_WORKER_ID
              valueFrom: {fieldRef: {fieldPath: metadata.name}}
            - name: HOME
              value: /tmp
          resources:
            requests: {cpu: 25m, memory: 96Mi}
            limits: {cpu: 500m, memory: 384Mi}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities: {drop: [ALL]}
          volumeMounts:
            - {name: temporary, mountPath: /tmp}
      volumes:
        - name: temporary
          emptyDir: {sizeLimit: 64Mi}
