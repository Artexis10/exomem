{{- $releaseJson := include "exomem.hostedReleaseJson" . -}}
{{- $workloadsRaw := .Files.Get "files/durability-workloads-v1.json" -}}
{{- $storageRaw := .Files.Get "files/durability-storage-v1.json" -}}
{{- if ne .Values.durability.contractSha256 ($workloadsRaw | sha256sum) -}}
{{- fail "durability workload contract SHA-256 mismatch" -}}
{{- end -}}
{{- if ne .Values.durability.storageContractSha256 ($storageRaw | sha256sum) -}}
{{- fail "durability storage contract SHA-256 mismatch" -}}
{{- end -}}
{{- $workloads := $workloadsRaw | mustFromJson -}}
{{- if or (ne (toJson $workloads.schemaVersion) "1") (ne $workloads.namespace .Release.Namespace) -}}
{{- fail "durability workload contract does not target this release" -}}
{{- end -}}
{{- $delivery := $workloads.workloads.deliveryGc -}}
{{- $backup := $workloads.workloads.vaultBackup -}}
{{- $database := $workloads.workloads.databaseBackup -}}
{{- $actions := $workloads.workloads.durabilityActions -}}
{{- $deletion := $workloads.workloads.deletion -}}
{{- $volume := $workloads.workloads.volumeLifecycle -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: exomem-durability-storage
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: exomem-hosted-durability
  annotations:
    exomem.io/storage-contract-sha256: {{ $storageRaw | sha256sum | quote }}
data:
  s3-endpoint: {{ .Values.durability.b2Endpoint | quote }}
  s3-region: {{ .Values.durability.b2Region | quote }}
  recovery-bucket: {{ .Values.durability.recoveryBucket | quote }}
  user-export-bucket: {{ .Values.durability.userExportBucket | quote }}
  database-backup-bucket: {{ .Values.durability.databaseBackupBucket | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: exomem-durability-workload-contract
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: exomem-hosted-durability
  annotations:
    exomem.io/durability-contract-sha256: {{ $workloadsRaw | sha256sum | quote }}
data:
  durability-workloads-v1.json: |-
{{ $workloadsRaw | indent 4 }}
---
apiVersion: v1
