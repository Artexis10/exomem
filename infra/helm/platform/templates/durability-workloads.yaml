apiVersion: batch/v1
kind: CronJob
metadata:
  name: exomem-database-backup
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: exomem-database-backup
    app.kubernetes.io/part-of: exomem-hosted-durability
spec:
  schedule: {{ $database.schedule | quote }}
  concurrencyPolicy: {{ $database.concurrencyPolicy }}
  startingDeadlineSeconds: {{ $database.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ $database.activeDeadlineSeconds }}
      backoffLimit: {{ $database.backoffLimit }}
      ttlSecondsAfterFinished: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: exomem-database-backup
            app.kubernetes.io/part-of: exomem-hosted-durability
        spec:
          serviceAccountName: {{ $database.serviceAccount }}
          automountServiceAccountToken: {{ $database.automountServiceAccountToken }}
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            fsGroup: 10001
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile: {type: RuntimeDefault}
          initContainers:
            - name: prepare-pg-files
              image: {{ .Values.provisioner.image }}
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-ec"]
              args:
                - >-
                  umask 077;
                  cp /source/pg_service.conf /run/secrets/exomem/database-backup/pg_service.conf;
                  cp /source/pgpass /run/secrets/exomem/database-backup/.pgpass;
                  chmod 0600 /run/secrets/exomem/database-backup/pg_service.conf
                  /run/secrets/exomem/database-backup/.pgpass
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 10001
                capabilities: {drop: [ALL]}
              volumeMounts:
                - {name: pg-source, mountPath: /source, readOnly: true}
                - {name: pg-runtime, mountPath: /run/secrets/exomem/database-backup}
          containers:
            - name: database-backup
              image: {{ .Values.provisioner.image }}
              imagePullPolicy: IfNotPresent
              command: {{ $database.command | toJson }}
              env:
                - name: EXOMEM_DURABILITY_DATABASE_URL
                  valueFrom:
                    secretKeyRef: {name: exomem-provisioner-database, key: url}
                - name: EXOMEM_DURABILITY_DATABASE_SCHEMA
                  value: {{ .Values.provisioner.databaseSchema | quote }}
                - name: EXOMEM_DURABILITY_DATABASE_ROLE
                  value: {{ .Values.provisioner.databaseRole | quote }}
                - name: EXOMEM_DURABILITY_ENVELOPE_KEY
                  valueFrom:
                    secretKeyRef: {name: exomem-provisioner-wrapping-key, key: key-material}
                - name: EXOMEM_PROVIDER_RECOVERY_SIGNING_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.provisioner.providerRecoverySigningKeySecret.name }}
                      key: {{ .Values.provisioner.providerRecoverySigningKeySecret.key }}
                - name: EXOMEM_DURABILITY_B2_ENDPOINT_URL
                  valueFrom:
                    configMapKeyRef: {name: exomem-durability-storage, key: s3-endpoint}
                - name: EXOMEM_DURABILITY_B2_REGION
                  valueFrom:
                    configMapKeyRef: {name: exomem-durability-storage, key: s3-region}
                - name: EXOMEM_DURABILITY_DATABASE_BACKUP_BUCKET
                  valueFrom:
                    configMapKeyRef: {name: exomem-durability-storage, key: database-backup-bucket}
                - name: EXOMEM_DURABILITY_DATABASE_BACKUP_UPLOAD_KEY_ID
                  valueFrom:
                    secretKeyRef: {name: exomem-database-backup-upload-key-id, key: application-key-id}
                - name: EXOMEM_DURABILITY_DATABASE_BACKUP_UPLOAD_KEY
                  valueFrom:
                    secretKeyRef: {name: exomem-database-backup-upload-key, key: application-key}
                - name: EXOMEM_DATABASE_BACKUP_PG_DUMP
                  value: /usr/bin/pg_dump
                - name: EXOMEM_DATABASE_BACKUP_PG_RESTORE
                  value: /usr/bin/pg_restore
                - name: EXOMEM_DATABASE_BACKUP_PSQL
                  value: /usr/bin/psql
                - name: EXOMEM_DATABASE_BACKUP_DROPDB
                  value: /usr/bin/dropdb
                - name: EXOMEM_DATABASE_BACKUP_CREATEDB
                  value: /usr/bin/createdb
                - name: EXOMEM_DATABASE_BACKUP_PG_SERVICE_FILE
                  value: /run/secrets/exomem/database-backup/pg_service.conf
                - name: EXOMEM_DATABASE_BACKUP_PGPASS_FILE
                  value: /run/secrets/exomem/database-backup/.pgpass
                - name: EXOMEM_DATABASE_BACKUP_PROOF_TENANT_ID
                  value: {{ .Values.durability.databaseBackup.proofTenantId | quote }}
                - name: EXOMEM_DATABASE_BACKUP_PROOF_CELL_ID
                  value: {{ .Values.durability.databaseBackup.proofCellId | quote }}
                - name: EXOMEM_DATABASE_BACKUP_SOURCE_SERVICE
                  value: {{ .Values.durability.databaseBackup.sourceService | quote }}
                - name: EXOMEM_DATABASE_BACKUP_MAINTENANCE_SERVICE
                  value: {{ .Values.durability.databaseBackup.maintenanceService | quote }}
                - name: EXOMEM_DATABASE_BACKUP_SCRATCH_SERVICE
                  value: {{ .Values.durability.databaseBackup.scratchService | quote }}
                - name: EXOMEM_DATABASE_BACKUP_SCRATCH_DATABASE
                  value: {{ .Values.durability.databaseBackup.scratchDatabase | quote }}
                - name: EXOMEM_DATABASE_BACKUP_EXPECTED_RESTORE_OWNER
                  value: {{ .Values.durability.databaseBackup.expectedRestoreOwner | quote }}
                - name: EXOMEM_DATABASE_BACKUP_VERIFICATION_SQL
                  value: {{ .Values.durability.databaseBackup.verificationSql | quote }}
                - name: EXOMEM_DURABILITY_SCRATCH_ROOT
                  value: /var/lib/exomem-scratch
                - name: HOME
                  value: /tmp
              resources:
                requests: {cpu: 50m, memory: 128Mi}
                limits: {cpu: 1, memory: 768Mi}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 10001
                capabilities: {drop: [ALL]}
              volumeMounts:
                - {name: pg-runtime, mountPath: /run/secrets/exomem/database-backup, readOnly: true}
                - {name: scratch, mountPath: /var/lib/exomem-scratch}
                - {name: temporary, mountPath: /tmp}
          volumes:
            - name: pg-source
              projected:
                defaultMode: 0400
                sources:
                  - secret:
                      name: exomem-database-backup-pg-service
                      items:
                        - {key: pg_service.conf, path: pg_service.conf}
                  - secret:
                      name: exomem-database-backup-pgpass
                      items:
                        - {key: pgpass, path: pgpass}
            - name: pg-runtime
              emptyDir: {sizeLimit: 1Mi}
            - name: scratch
              emptyDir: {sizeLimit: 2Gi}
            - name: temporary
              emptyDir: {sizeLimit: 64Mi}
