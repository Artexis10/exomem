apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: exomem-tenant-cell-boundary
spec:
  failurePolicy: Fail
  matchConstraints:
    namespaceSelector:
      matchLabels:
        exomem.io/tenant-cell: "true"
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  matchConditions:
    - name: serving-pods-only
      expression: >-
        !has(object.spec.runtimeClassName) || object.spec.runtimeClassName != 'exomem-storage-init'
  validations:
    - expression: >-
        has(object.metadata.labels) && 'exomem.io/cell' in object.metadata.labels &&
        object.spec.serviceAccountName == object.metadata.labels['exomem.io/cell'] &&
        object.spec.automountServiceAccountToken == false
      message: Tenant cell pods must use their cell-scoped no-API ServiceAccount.
    - expression: >-
        (!has(object.spec.hostNetwork) || object.spec.hostNetwork == false) &&
        (!has(object.spec.hostPID) || object.spec.hostPID == false) &&
        (!has(object.spec.hostIPC) || object.spec.hostIPC == false) &&
        !has(object.spec.nodeName) && !has(object.spec.hostAliases)
      message: Tenant cell pods cannot select a node or use host networking, processes, IPC, or aliases.
    - expression: >-
        size(object.spec.containers) == 1 && size(object.spec.initContainers) == 0 &&
        object.spec.containers[0].name == 'exomem' &&
        object.spec.containers[0].image.matches('^.+@sha256:[0-9a-f]{64}$') &&
        object.spec.containers[0].securityContext.runAsNonRoot == true &&
        object.spec.containers[0].securityContext.runAsUser == 10001 &&
        object.spec.containers[0].securityContext.runAsGroup == 10001 &&
        object.spec.containers[0].securityContext.allowPrivilegeEscalation == false &&
        object.spec.containers[0].securityContext.readOnlyRootFilesystem == true &&
        (!has(object.spec.containers[0].securityContext.privileged) ||
          object.spec.containers[0].securityContext.privileged == false) &&
        object.spec.containers[0].securityContext.capabilities.drop.exists(capability, capability == 'ALL')
      message: Tenant cell pods must use the immutable restricted one-container runtime shape.
    - expression: >-
        object.spec.volumes.all(volume,
          (volume.name == 'data' && has(volume.persistentVolumeClaim) &&
            volume.persistentVolumeClaim.claimName == object.metadata.labels['exomem.io/cell'] + '-data') ||
          (volume.name == 'credentials' && has(volume.secret) &&
            volume.secret.secretName == object.metadata.labels['exomem.io/cell'] + '-credentials') ||
          (volume.name == 'tmp' && has(volume.emptyDir) && volume.emptyDir.sizeLimit == quantity('256Mi')))
      message: Tenant cell pods may mount only their own PVC, credential Secret, and bounded temporary volume.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: exomem-tenant-cell-boundary
spec:
  policyName: exomem-tenant-cell-boundary
  validationActions: [Deny]
