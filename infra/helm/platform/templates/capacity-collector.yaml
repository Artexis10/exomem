{{- $runtimeImage := include "exomem.hostedRuntimeImage" . -}}
{{- $contractRaw := .Files.Get "files/private-alpha-capacity-v1.json" -}}
{{- if ne .Values.capacityCollector.contractSha256 ($contractRaw | sha256sum) -}}
{{- fail "capacity collector contract SHA-256 mismatch" -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: exomem-operational-receipt-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: exomem-hosted-operations
  annotations:
    exomem.io/capacity-contract-sha256: {{ $contractRaw | sha256sum | quote }}
immutable: true
data:
  operational_receipt_collector.py: |
{{ .Files.Get "files/operational_receipt_collector.py" | indent 4 }}
  private-alpha-capacity-v1.json: |
{{ $contractRaw | indent 4 }}
{{- $stateName := .Values.capacityCollector.stateConfigMap -}}
{{- $initialState := `{"schema_version":1,"last_sequence":0}` -}}
{{- $existingState := lookup "v1" "ConfigMap" .Release.Namespace $stateName -}}
{{- $persistedState := $initialState -}}
{{- $persistedReceipt := "" -}}
{{- if and $existingState $existingState.data (hasKey $existingState.data "state.json") -}}
{{- $persistedState = index $existingState.data "state.json" -}}
{{- end -}}
{{- if and $existingState $existingState.data (hasKey $existingState.data "receipt.json") -}}
{{- $persistedReceipt = index $existingState.data "receipt.json" -}}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $stateName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: exomem-hosted-operations
    exomem.io/capacity-receipt-state: "true"
  annotations:
    helm.sh/resource-policy: keep
immutable: false
data:
  state.json: {{ $persistedState | quote }}
{{- if $persistedReceipt }}
  receipt.json: {{ $persistedReceipt | quote }}
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: exomem-capacity-receipt-collector
  namespace: {{ .Release.Namespace }}
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: exomem-capacity-receipt-collector
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: exomem-capacity-receipt-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: exomem-capacity-receipt-collector
subjects:
  - kind: ServiceAccount
    name: exomem-capacity-receipt-collector
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: exomem-capacity-receipt-collector
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: [{{ $stateName | quote }}]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: exomem-capacity-receipt-collector
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: exomem-capacity-receipt-collector
subjects:
  - kind: ServiceAccount
    name: exomem-capacity-receipt-collector
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: exomem-capacity-receipt-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: exomem-capacity-receipt-collector
    app.kubernetes.io/part-of: exomem-hosted-operations
spec:
  schedule: {{ .Values.capacityCollector.schedule | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 30
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 45
      backoffLimit: 0
      ttlSecondsAfterFinished: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: exomem-capacity-receipt-collector
            app.kubernetes.io/part-of: exomem-hosted-operations
        spec:
          serviceAccountName: exomem-capacity-receipt-collector
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            fsGroup: 10001
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: collector
              image: {{ $runtimeImage }}
              imagePullPolicy: IfNotPresent
              command:
                - python
                - /opt/exomem-hosted/operational_receipt_collector.py
                - capacity
              args:
                - --contract
                - /opt/exomem-hosted/private-alpha-capacity-v1.json
                - --namespace
                - {{ .Release.Namespace }}
                - --state-configmap
                - {{ $stateName }}
                - --hcloud-server-id
                - {{ .Values.capacityCollector.hcloudServerId | quote }}
                - --hcloud-location
                - {{ .Values.provisioner.location | quote }}
              env:
                - name: EXOMEM_CAPACITY_RECEIPT_PRIVATE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.capacityCollector.privateKeySecret.name }}
                      key: {{ .Values.capacityCollector.privateKeySecret.key }}
                - name: EXOMEM_HCLOUD_CAPACITY_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.capacityCollector.hcloudTokenSecret.name }}
                      key: {{ .Values.capacityCollector.hcloudTokenSecret.key }}
                - name: EXOMEM_ALERT_WEBHOOK_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.observability.alertDeliverySecretName }}
                      key: {{ .Values.observability.alertDeliverySecretKey }}
              volumeMounts:
                - name: runtime
                  mountPath: /opt/exomem-hosted
                  readOnly: true
                - name: kube-api
                  mountPath: /var/run/secrets/exomem-api
                  readOnly: true
              resources:
                requests: {cpu: 10m, memory: 32Mi}
                limits: {cpu: 100m, memory: 96Mi}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 10001
                capabilities: {drop: [ALL]}
          volumes:
            - name: runtime
              configMap:
                name: exomem-operational-receipt-collector
                defaultMode: 0444
            - name: kube-api
              projected:
                defaultMode: 0440
                sources:
                  - serviceAccountToken:
                      path: token
                      expirationSeconds: 600
                      audience: https://kubernetes.default.svc.cluster.local
                  - configMap:
                      name: kube-root-ca.crt
                      items:
                        - key: ca.crt
                          path: ca.crt
