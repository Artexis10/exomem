{{- $contractRaw := .Files.Get "files/exomem-hosted-schedules-v1.json" -}}
{{- $runtimeImage := include "exomem.hostedRuntimeImage" . -}}
{{- $contract := $contractRaw | fromJson -}}
{{- $contractSha256 := $contractRaw | sha256sum -}}
{{- if ne (int .Values.scheduler.contractVersion) (int $contract.version) -}}
{{- fail "unsupported hosted scheduler contract version" -}}
{{- end }}
{{- if ne .Values.scheduler.contractSha256 $contractSha256 -}}
{{- fail "scheduler contract SHA-256 mismatch" -}}
{{- end }}
{{- if or (ne $contract.authentication.scheme "bearer") (ne $contract.authentication.schedulerEnvironmentVariable "EXOMEM_HOSTED_SCHEDULER_SECRET") (ne $contract.authentication.receiverActiveEnvironmentVariable "EXOMEM_HOSTED_SCHEDULER_SECRET") (ne $contract.authentication.receiverPreviousEnvironmentVariable "EXOMEM_HOSTED_SCHEDULER_SECRET_PREVIOUS") (ne (int $contract.authentication.maxReceiverVersions) 2) -}}
{{- fail "unsupported hosted scheduler authentication contract" -}}
{{- end }}
{{- if or (ne $contract.requestPolicy.method "GET") (ne $contract.requestPolicy.redirect "error") (ne ($contract.requestPolicy.successStatusCodes | toJson) "[200]") -}}
{{- fail "unsupported hosted scheduler request/status contract" -}}
{{- end }}
{{- if ne (int $contract.kubernetesJobPolicy.maxAttempts) (add 1 (int $contract.kubernetesJobPolicy.backoffLimit) | int) -}}
{{- fail "scheduler maxAttempts must equal backoffLimit plus one" -}}
{{- end }}
{{- if or (ne $contract.observability.contentFree true) (ne $contract.observability.attemptCounterMetric "exomem_hosted_scheduler_attempts_total") (ne $contract.observability.failureCounterMetric "exomem_hosted_scheduler_failures_total") (ne $contract.observability.durationHistogramMetric "exomem_hosted_scheduler_duration_seconds") (ne $contract.observability.lastSuccessMetric "exomem_hosted_scheduler_last_success_unixtime") (ne (int $contract.observability.missedRunAlertAfterSeconds) 180) (ne (int $contract.observability.consecutiveFailureAlertThreshold) 2) -}}
{{- fail "unsupported hosted scheduler observability contract" -}}
{{- end }}
{{- $schedulerEnvironmentVariable := $contract.authentication.schedulerEnvironmentVariable -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: exomem-hosted-scheduler
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: exomem-hosted-scheduler-state-writer
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames:
{{- range $job := $contract.jobs }}
      - exomem-hosted-scheduler-state-{{ $job.name }}
{{- end }}
    verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: exomem-hosted-scheduler-state-writer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: exomem-hosted-scheduler-state-writer
subjects:
  - kind: ServiceAccount
    name: exomem-hosted-scheduler
    namespace: exomem-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: exomem-hosted-scheduler-contract
  annotations:
    exomem.io/contract-sha256: {{ $contractSha256 | quote }}
data:
  contract.json: |-
{{ $contractRaw | indent 4 }}
{{- range $job := $contract.jobs }}
{{- $cadenceSeconds := 0 -}}
{{- if eq $job.schedule "* * * * *" -}}
{{- $cadenceSeconds = 60 -}}
{{- else if eq $job.schedule "17 * * * *" -}}
{{- $cadenceSeconds = 3600 -}}
{{- else -}}
{{- fail "scheduler job has an unsupported cadence" -}}
{{- end }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $job.name }}
  labels:
    app.kubernetes.io/name: {{ $job.name }}
    app.kubernetes.io/part-of: exomem-hosted-scheduler
  annotations:
    exomem.io/contract-version: {{ $contract.version | quote }}
    exomem.io/contract-sha256: {{ $contractSha256 | quote }}
spec:
  schedule: {{ $job.schedule | quote }}
  concurrencyPolicy: {{ $contract.kubernetesJobPolicy.concurrencyPolicy }}
  startingDeadlineSeconds: {{ $contract.kubernetesJobPolicy.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ $contract.kubernetesJobPolicy.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ $contract.kubernetesJobPolicy.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      activeDeadlineSeconds: {{ $contract.kubernetesJobPolicy.activeDeadlineSeconds }}
      backoffLimit: {{ $contract.kubernetesJobPolicy.backoffLimit }}
      ttlSecondsAfterFinished: {{ $contract.kubernetesJobPolicy.ttlSecondsAfterFinished }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ $job.name }}
            app.kubernetes.io/part-of: exomem-hosted-scheduler
        spec:
          serviceAccountName: exomem-hosted-scheduler
          automountServiceAccountToken: false
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            fsGroup: 10001
            fsGroupChangePolicy: OnRootMismatch
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: request
              image: {{ $runtimeImage }}
              imagePullPolicy: IfNotPresent
              command: ["python", "/opt/exomem-hosted/scheduler_runtime.py", "request"]
              env:
                - name: {{ $schedulerEnvironmentVariable }}
                  valueFrom:
                    secretKeyRef:
                      name: {{ $.Values.scheduler.secretName }}
                      key: {{ $.Values.scheduler.secretKey }}
                - name: JOB_NAME
                  value: {{ $job.name | quote }}
                - name: TARGET_URL
                  value: {{ printf "%s%s" $contract.origin $job.path | quote }}
                - name: CADENCE_SECONDS
                  value: {{ $cadenceSeconds | quote }}
                - name: CONNECT_TIMEOUT_SECONDS
                  value: {{ $contract.requestPolicy.connectTimeoutSeconds | quote }}
                - name: TOTAL_TIMEOUT_SECONDS
                  value: {{ $contract.requestPolicy.totalTimeoutSeconds | quote }}
              volumeMounts:
                - name: runtime
                  mountPath: /opt/exomem-hosted
                  readOnly: true
                - name: kube-api
                  mountPath: /var/run/secrets/exomem-api
                  readOnly: true
              resources:
                requests:
                  cpu: 5m
                  memory: 24Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 10001
                capabilities:
                  drop: [ALL]
          volumes:
            - name: runtime
              configMap:
                name: exomem-hosted-scheduler-runtime
                defaultMode: 0444
            - name: kube-api
              projected:
                defaultMode: 0440
                sources:
                  - serviceAccountToken:
                      path: token
                      expirationSeconds: 600
                      audience: https://kubernetes.default.svc.cluster.local
                  - configMap:
                      name: kube-root-ca.crt
                      items:
                        - key: ca.crt
                          path: ca.crt
{{- end }}
