apiVersion: v1
kind: Namespace
metadata:
  name: exomem-platform
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/part-of: exomem-hosted
    # The pinned CSI node plugin requires hostPath/device access. Tenant workloads
    # never run here; platform admission and exact Helm values own this namespace.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/enforce-version: v1.35
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: v1.35
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: v1.35
---
apiVersion: v1
kind: Namespace
metadata:
  name: exomem-system
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/part-of: exomem-hosted
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.35
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: v1.35
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: v1.35
