        !has(object.spec.containers[0].readinessProbe.exec) &&
        !has(object.spec.containers[0].readinessProbe.httpGet) &&
        !has(object.spec.containers[0].readinessProbe.grpc) &&
        (!has(object.spec.containers[0].readinessProbe.initialDelaySeconds) ||
          object.spec.containers[0].readinessProbe.initialDelaySeconds == 0) &&
        object.spec.containers[0].readinessProbe.periodSeconds == 5 &&
        object.spec.containers[0].readinessProbe.timeoutSeconds == 1 &&
        object.spec.containers[0].readinessProbe.successThreshold == 1 &&
        object.spec.containers[0].readinessProbe.failureThreshold == 2 &&
        !has(object.spec.containers[0].readinessProbe.terminationGracePeriodSeconds) &&
