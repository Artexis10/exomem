apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: exomem-tenant-boundary
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  variables:
    - name: storageInit
      expression: >-
        has(object.spec.runtimeClassName) && object.spec.runtimeClassName == 'exomem-storage-init'
    - name: tenantNamespace
      expression: >-
        has(namespaceObject.metadata.labels) &&
        'exomem.io/tenant-cell' in namespaceObject.metadata.labels &&
        namespaceObject.metadata.labels['exomem.io/tenant-cell'] == 'true'
    - name: inScope
      expression: variables.storageInit || variables.tenantNamespace
    - name: controllerUpdate
      expression: >-
        request.operation == 'UPDATE' &&
        request.userInfo.username == 'system:serviceaccount:kube-system:job-controller' &&
        variables.storageInit &&
        has(oldObject.spec.nodeName) &&
        has(object.spec.nodeName) &&
        object.spec.nodeName == oldObject.spec.nodeName
    - name: controllerJobFinalizerRemoval
      expression: >-
        has(oldObject.metadata.finalizers) &&
        size(oldObject.metadata.finalizers) == 1 &&
        oldObject.metadata.finalizers[0] == 'batch.kubernetes.io/job-tracking' &&
        (!has(object.metadata.finalizers) || size(object.metadata.finalizers) == 0)
    - name: controllerJobFinalizerTransition
      expression: >-
        variables.controllerUpdate &&
        variables.controllerJobFinalizerRemoval
  validations:
    - expression: >-
        !variables.inScope ||
        (
        has(namespaceObject.metadata.labels) &&
        namespaceObject.metadata.labels['exomem.io/tenant-cell'] == 'true' &&
        has(namespaceObject.metadata.annotations) &&
        'exomem.io/resource-name' in namespaceObject.metadata.annotations &&
        'exomem.io/pvc-name' in namespaceObject.metadata.annotations &&
        'exomem.io/credentials-secret-name' in namespaceObject.metadata.annotations &&
        'exomem.io/init-request-configmap-name' in namespaceObject.metadata.annotations &&
        has(object.metadata.labels) &&
        'exomem.io/cell' in object.metadata.labels &&
        object.metadata.labels['exomem.io/cell'] == namespaceObject.metadata.annotations['exomem.io/resource-name'] &&
        object.spec.serviceAccountName == namespaceObject.metadata.annotations['exomem.io/resource-name'] &&
        object.spec.automountServiceAccountToken == false)
      message: The pod must match its platform-owned tenant namespace contract.
    - expression: >-
        !variables.inScope ||
        (
        (!has(object.spec.hostNetwork) || object.spec.hostNetwork == false) &&
        (!has(object.spec.hostPID) || object.spec.hostPID == false) &&
        (!has(object.spec.hostIPC) || object.spec.hostIPC == false) &&
        (!has(object.spec.nodeName) || variables.controllerJobFinalizerTransition) &&
        !has(object.spec.hostAliases))
      message: Tenant pods cannot use host access or node selection; only the controller-owned Job finalizer transition may preserve an assigned node.
    - expression: >-
        !variables.inScope ||
        (
        has(object.spec.securityContext) &&
        has(object.spec.securityContext.seccompProfile) &&
        object.spec.securityContext.seccompProfile.type == 'RuntimeDefault' &&
        !has(object.spec.securityContext.fsGroup) &&
        !has(object.spec.securityContext.fsGroupChangePolicy) &&
        !has(object.spec.securityContext.runAsUser) &&
        !has(object.spec.securityContext.runAsGroup) &&
        !has(object.spec.securityContext.supplementalGroups) &&
        !has(object.spec.securityContext.sysctls))
      message: Tenant pod security context must be the exact runtime-default profile.
    - expression: >-
        !variables.inScope ||
        ((has(object.spec.runtimeClassName) && object.spec.runtimeClassName == 'exomem-storage-init' &&
          object.spec.restartPolicy == 'Never') ||
          ((!has(object.spec.runtimeClassName) || object.spec.runtimeClassName != 'exomem-storage-init') &&
            object.spec.restartPolicy == 'Always'))
      message: Tenant pod restart policy must match its lifecycle mode.
    - expression: >-
        !variables.inScope ||
        (
        (!has(object.spec.initContainers) || size(object.spec.initContainers) == 0) &&
        size(object.spec.containers) == 1)
      message: Tenant pods cannot use sidecars or init containers.
    - expression: >-
        !variables.inScope ||
        (
        object.spec.containers[0].name == 'exomem' &&
        object.spec.containers[0].image == {{ .Values.runtime.image | quote }} &&
        object.spec.containers[0].imagePullPolicy == 'IfNotPresent' &&
        object.spec.containers[0].securityContext.allowPrivilegeEscalation == false &&
        object.spec.containers[0].securityContext.readOnlyRootFilesystem == true &&
        (!has(object.spec.containers[0].securityContext.privileged) ||
          object.spec.containers[0].securityContext.privileged == false) &&
        !has(object.spec.containers[0].securityContext.seccompProfile) &&
        size(object.spec.containers[0].securityContext.capabilities.drop) == 1 &&
        object.spec.containers[0].securityContext.capabilities.drop[0] == 'ALL')
      message: Tenant pods must use the exact approved immutable image and base security context.
    - expression: >-
        !variables.inScope ||
        (
        object.spec.containers[0].terminationMessagePath == '/dev/termination-log' &&
        object.spec.containers[0].terminationMessagePolicy == 'File')
      message: Tenant pods must use the safe termination message path and policy.
    - expression: >-
        !variables.inScope ||
        (!has(object.spec.runtimeClassName) || object.spec.runtimeClassName != 'exomem-storage-init') ||
        (
        !has(object.spec.containers[0].command) &&
        object.spec.containers[0].args == ['hosted', 'init', '--contract-version', '1', '--request-file', '/run/exomem/operator-requests/init.json'] &&
        (!has(object.spec.containers[0].env) || size(object.spec.containers[0].env) == 0) &&
        object.spec.containers[0].securityContext.runAsUser == 0 &&
        object.spec.containers[0].securityContext.runAsGroup == 0 &&
        size(object.spec.containers[0].securityContext.capabilities.add) == 3 &&
        object.spec.containers[0].securityContext.capabilities.add.all(capability,
          capability in ['CHOWN', 'DAC_OVERRIDE', 'FOWNER']) &&
        (!has(object.spec.containers[0].securityContext.procMount) ||
          object.spec.containers[0].securityContext.procMount == 'Default') &&
        !has(object.spec.containers[0].securityContext.seLinuxOptions) &&
        !has(object.spec.containers[0].securityContext.windowsOptions) &&
        !has(object.spec.containers[0].securityContext.appArmorProfile))
      message: Storage initialization must use the exact approved operator command, identity, and capabilities.
    - expression: >-
        !variables.inScope ||
        !variables.storageInit ||
        (
        !has(object.spec.containers[0].lifecycle) &&
        !has(object.spec.containers[0].livenessProbe) &&
        !has(object.spec.containers[0].readinessProbe) &&
        !has(object.spec.containers[0].startupProbe) &&
        (!has(object.spec.containers[0].ports) || size(object.spec.containers[0].ports) == 0) &&
        (!has(object.spec.containers[0].envFrom) || size(object.spec.containers[0].envFrom) == 0) &&
        (!has(object.spec.containers[0].volumeDevices) || size(object.spec.containers[0].volumeDevices) == 0) &&
        (!has(object.spec.containers[0].resizePolicy) || size(object.spec.containers[0].resizePolicy) == 0) &&
        (!has(object.spec.containers[0].workingDir) || object.spec.containers[0].workingDir == '') &&
        (!has(object.spec.containers[0].stdin) || object.spec.containers[0].stdin == false) &&
        (!has(object.spec.containers[0].stdinOnce) || object.spec.containers[0].stdinOnce == false) &&
        (!has(object.spec.containers[0].tty) || object.spec.containers[0].tty == false) &&
        !has(object.spec.containers[0].restartPolicy))
      message: Storage initialization cannot expose additional executable or interactive surfaces.
    - expression: >-
        !variables.inScope ||
        (!has(object.spec.runtimeClassName) || object.spec.runtimeClassName != 'exomem-storage-init') ||
        (
        string(dyn(object.spec.containers[0].resources).requests['cpu']) == '100m' &&
        string(dyn(object.spec.containers[0].resources).requests['memory']) == '128Mi' &&
        string(dyn(object.spec.containers[0].resources).limits['cpu']) == '1' &&
        string(dyn(object.spec.containers[0].resources).limits['memory']) == '1Gi' &&
        size(dyn(object.spec.containers[0].resources).requests) == 2 &&
        size(dyn(object.spec.containers[0].resources).limits) == 2)
      message: Storage initialization must use the exact approved compute resources.
    - expression: >-
        !variables.inScope ||
        (!has(object.spec.runtimeClassName) || object.spec.runtimeClassName != 'exomem-storage-init') ||
        (size(object.spec.volumes) == 3 && object.spec.volumes.all(volume,
          (volume.name == 'data' && has(volume.persistentVolumeClaim) &&
            volume.persistentVolumeClaim.claimName == namespaceObject.metadata.annotations['exomem.io/pvc-name']) ||
          (volume.name == 'credentials' && has(volume.secret) &&
            volume.secret.secretName == namespaceObject.metadata.annotations['exomem.io/credentials-secret-name'] &&
            volume.secret.defaultMode == 292) ||
          (volume.name == 'init-request' && has(volume.configMap) &&
            volume.configMap.name == namespaceObject.metadata.annotations['exomem.io/init-request-configmap-name'] &&
            volume.configMap.defaultMode == 292)))
      message: Storage initialization may mount only the exact tenant PVC, credential Secret, and request ConfigMap.
    - expression: >-
        !variables.inScope ||
        (!has(object.spec.runtimeClassName) || object.spec.runtimeClassName != 'exomem-storage-init') ||
        (size(object.spec.containers[0].volumeMounts) == 3 &&
        object.spec.containers[0].volumeMounts.exists(mount,
          mount.name == 'data' && mount.mountPath == '/var/lib/exomem' && !has(mount.subPath) &&
          (!has(mount.readOnly) || mount.readOnly == false)) &&
        object.spec.containers[0].volumeMounts.exists(mount,
          mount.name == 'credentials' && mount.mountPath == '/run/exomem/credentials' &&
          mount.readOnly == true && !has(mount.subPath)) &&
        object.spec.containers[0].volumeMounts.exists(mount,
          mount.name == 'init-request' && mount.mountPath == '/run/exomem/operator-requests/init.json' &&
          mount.readOnly == true && mount.subPath == 'init.json'))
      message: Storage initialization mounts must match the exact tenant paths.
    - expression: >-
        !variables.inScope ||
        (has(object.spec.runtimeClassName) && object.spec.runtimeClassName == 'exomem-storage-init') ||
        (
        !has(object.spec.containers[0].command) &&
        object.spec.containers[0].args == ['--transport', 'http', '--port', '8765'] &&
        size(object.spec.containers[0].env) == 19 &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_HOSTED_CELL' && has(env.value) && env.value == '1' && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_HOSTED_CELL_ID' && has(env.value) &&
          env.value == namespaceObject.metadata.annotations['exomem.io/cell-id'] && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_HOSTED_VAULT_ID' && has(env.value) &&
          env.value == namespaceObject.metadata.annotations['exomem.io/vault-id'] && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_HOSTED_RUNTIME_UID' && has(env.value) && env.value == '10001' && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_HOSTED_RUNTIME_GID' && has(env.value) && env.value == '10001' && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_VAULT_PATH' && has(env.value) && env.value == '/var/lib/exomem/vault' && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_HOSTED_STATE_ROOT' && has(env.value) && env.value == '/var/lib/exomem/state' && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_LOG_DIR' && has(env.value) && env.value == '/var/lib/exomem/logs' && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'TMPDIR' && has(env.value) && env.value == '/var/lib/exomem/state/tmp/runtime' && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'HOME' && has(env.value) && env.value == '/var/lib/exomem/state/home' && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_HOSTED_PROTOCOL_VERSION' && has(env.value) && env.value == '1' && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_HOSTED_EXPECTED_RELEASE' && has(env.value) &&
          env.value == namespaceObject.metadata.annotations['exomem.io/expected-release'] && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_HOSTED_WORKER_POLICY_DIGEST' && has(env.value) &&
          env.value == namespaceObject.metadata.annotations['exomem.io/worker-policy-digest'] && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_HOSTED_STORAGE_LIMIT_BYTES' && has(env.value) && env.value == '5368709120' && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_HOSTED_UPLOAD_LIMIT_BYTES' && has(env.value) && env.value == '94371840' && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_HOSTED_WORKER_LIMIT' && has(env.value) && env.value == '0' && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_HOSTED_FEATURE_GRANTS' &&
          (!has(env.value) || env.value == '') && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_HOSTED_TRANSFER_BROWSER_ORIGIN' && has(env.value) &&
          env.value == namespaceObject.metadata.annotations['exomem.io/browser-origin'] && !has(env.valueFrom)) &&
        object.spec.containers[0].env.exists(env,
          env.name == 'EXOMEM_HOSTED_TRANSFER_HOST' && has(env.value) &&
          env.value == namespaceObject.metadata.annotations['exomem.io/transfer-hostname'] && !has(env.valueFrom)))
      message: Serving pods must use the exact approved serving command and environment.
    - expression: >-
        !variables.inScope ||
        (has(object.spec.runtimeClassName) && object.spec.runtimeClassName == 'exomem-storage-init') ||
        (
        !has(object.spec.containers[0].lifecycle) &&
        size(object.spec.containers[0].ports) == 1 &&
        object.spec.containers[0].ports[0].name == 'http' &&
        object.spec.containers[0].ports[0].containerPort == 8765 &&
        object.spec.containers[0].ports[0].protocol == 'TCP' &&
        !has(object.spec.containers[0].ports[0].hostIP) &&
        !has(object.spec.containers[0].ports[0].hostPort) &&
        has(object.spec.containers[0].startupProbe) &&
        has(object.spec.containers[0].startupProbe.tcpSocket) &&
        string(dyn(object.spec.containers[0].startupProbe.tcpSocket.port)) == 'http' &&
        !has(object.spec.containers[0].startupProbe.exec) &&
        !has(object.spec.containers[0].startupProbe.httpGet) &&
        !has(object.spec.containers[0].startupProbe.grpc) &&
        (!has(object.spec.containers[0].startupProbe.initialDelaySeconds) ||
          object.spec.containers[0].startupProbe.initialDelaySeconds == 0) &&
        object.spec.containers[0].startupProbe.periodSeconds == 2 &&
        object.spec.containers[0].startupProbe.timeoutSeconds == 1 &&
        object.spec.containers[0].startupProbe.successThreshold == 1 &&
        object.spec.containers[0].startupProbe.failureThreshold == 30 &&
        !has(object.spec.containers[0].startupProbe.terminationGracePeriodSeconds) &&
        has(object.spec.containers[0].livenessProbe) &&
        has(object.spec.containers[0].livenessProbe.tcpSocket) &&
        string(dyn(object.spec.containers[0].livenessProbe.tcpSocket.port)) == 'http' &&
        !has(object.spec.containers[0].livenessProbe.exec) &&
        !has(object.spec.containers[0].livenessProbe.httpGet) &&
        !has(object.spec.containers[0].livenessProbe.grpc) &&
        (!has(object.spec.containers[0].livenessProbe.initialDelaySeconds) ||
          object.spec.containers[0].livenessProbe.initialDelaySeconds == 0) &&
        object.spec.containers[0].livenessProbe.periodSeconds == 10 &&
        object.spec.containers[0].livenessProbe.timeoutSeconds == 1 &&
        object.spec.containers[0].livenessProbe.successThreshold == 1 &&
