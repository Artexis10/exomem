apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: exomem-storage-init-boundary
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  validations:
    - expression: >-
        !has(object.spec.runtimeClassName) || object.spec.runtimeClassName != 'exomem-storage-init' ||
        (has(object.metadata.labels) && 'exomem.io/storage-init' in object.metadata.labels &&
        object.metadata.labels['exomem.io/storage-init'] == 'true')
      message: The storage-init runtime class is reserved for labelled Exomem initialization jobs.
    - expression: >-
        !has(object.spec.runtimeClassName) || object.spec.runtimeClassName != 'exomem-storage-init' ||
        (!has(object.spec.hostNetwork) && !has(object.spec.hostPID) && !has(object.spec.hostIPC) &&
        object.spec.automountServiceAccountToken == false && object.spec.restartPolicy == 'Never')
      message: Exomem storage initialization cannot use host namespaces or API credentials.
    - expression: >-
        !has(object.spec.runtimeClassName) || object.spec.runtimeClassName != 'exomem-storage-init' ||
        (size(object.spec.containers) == 1 && size(object.spec.initContainers) == 0 &&
        object.spec.containers[0].name == 'exomem' &&
        object.spec.containers[0].image.matches('^.+@sha256:[0-9a-f]{64}$') &&
        object.spec.containers[0].args == ['hosted', 'init', '--request-file', '/run/exomem/operator-requests/init.json'] &&
        object.spec.containers[0].securityContext.runAsUser == 0 &&
        object.spec.containers[0].securityContext.allowPrivilegeEscalation == false &&
        object.spec.containers[0].securityContext.readOnlyRootFilesystem == true)
      message: Exomem storage initialization must use the immutable one-container operator shape.
    - expression: >-
        !has(object.spec.runtimeClassName) || object.spec.runtimeClassName != 'exomem-storage-init' ||
        object.spec.volumes.all(volume,
          has(volume.persistentVolumeClaim) || has(volume.secret) || has(volume.configMap))
      message: Exomem storage initialization may mount only its PVC, credential Secret, and request ConfigMap.
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: exomem-storage-init-boundary
spec:
  policyName: exomem-storage-init-boundary
  validationActions: [Deny]
