apiVersion: v1
kind: ServiceAccount
metadata:
  name: exomem-cloudflared
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: exomem-cloudflared
  labels:
    app.kubernetes.io/name: exomem-cloudflared
    app.kubernetes.io/part-of: exomem-hosted
spec:
  replicas: {{ .Values.cloudflared.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: exomem-cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: exomem-cloudflared
        app.kubernetes.io/part-of: exomem-hosted
    spec:
      serviceAccountName: exomem-cloudflared
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cloudflared
          image: {{ .Values.cloudflared.image }}
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --no-autoupdate
            - --metrics
            - 0.0.0.0:2000
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.cloudflared.tokenSecretName }}
                  key: {{ .Values.cloudflared.tokenSecretKey }}
          ports:
            - name: metrics
              containerPort: 2000
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 192Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ALL]
