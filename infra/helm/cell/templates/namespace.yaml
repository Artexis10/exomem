apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    exomem.io/tenant-cell: "true"
    exomem.io/cell-resource: {{ .Values.resourceName | quote }}
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: v1.35
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: v1.35
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: v1.35
  annotations:
    helm.sh/resource-policy: keep
    exomem.io/resource-name: {{ .Values.resourceName | quote }}
    exomem.io/approved-image: {{ .Values.image | quote }}
    exomem.io/pvc-name: {{ printf "%s-data" .Values.resourceName | quote }}
    exomem.io/credentials-secret-name: {{ .Values.credentialsSecretName | quote }}
    exomem.io/init-request-configmap-name: {{ printf "%s-init-request" .Values.resourceName | quote }}
