name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to re-publish (PyPI and/or GHCR), for example v0.2.1
        required: true
        type: string

# Prefer the same GitHub App-token pattern as the Endstate repos. A non-GITHUB_TOKEN
# credential lets Release Please PRs and releases trigger normal CI/release events.
# If the app secrets are not configured on this repo yet, fall back to GITHUB_TOKEN
# so release automation still works, with GitHub's normal recursion protection.
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    env:
      HAS_RELEASE_APP: ${{ secrets.RELEASE_PLEASE_APP_CLIENT_ID != '' && secrets.RELEASE_PLEASE_APP_PRIVATE_KEY != '' }}
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Mint GitHub App installation token
        if: env.HAS_RELEASE_APP == 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-artifacts:
    needs: release-please
    if: ${{ github.event_name == 'push' && needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Verify package version matches release tag
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib

          expected = os.environ["TAG"].removeprefix("v")
          with open("pyproject.toml", "rb") as fh:
              actual = tomllib.load(fh)["project"]["version"]
          if actual != expected:
              raise SystemExit(f"pyproject version {actual} does not match release tag {expected}")
          PY

      - name: Build package artifacts
        run: uv build

      - name: Upload artifacts to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" dist/* --clobber

  publish-pypi:
    needs: [release-please, build-artifacts]
    if: ${{ github.event_name == 'push' && needs.release-please.outputs.release_created == 'true' && vars.PYPI_PUBLISH_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build package artifacts
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-image:
    needs: [release-please, build-artifacts]
    if: ${{ github.event_name == 'push' && needs.release-please.outputs.release_created == 'true' && vars.GHCR_PUBLISH_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image version from the release tag
        id: meta
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push lean image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: lean
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/artexis10/exomem:latest
            ghcr.io/artexis10/exomem:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ml image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ml
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/artexis10/exomem:ml
            ghcr.io/artexis10/exomem:${{ steps.meta.outputs.version }}-ml
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push cuda image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: cuda
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/artexis10/exomem:cuda
            ghcr.io/artexis10/exomem:${{ steps.meta.outputs.version }}-cuda
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-existing-image:
    if: ${{ github.event_name == 'workflow_dispatch' && vars.GHCR_PUBLISH_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image version from the input tag
        id: meta
        env:
          TAG: ${{ inputs.tag }}
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push lean image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: lean
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/artexis10/exomem:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ml image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ml
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/artexis10/exomem:${{ steps.meta.outputs.version }}-ml
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push cuda image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: cuda
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/artexis10/exomem:${{ steps.meta.outputs.version }}-cuda
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-existing-pypi:
    if: ${{ github.event_name == 'workflow_dispatch' && vars.PYPI_PUBLISH_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Verify package version matches release tag
        env:
          TAG: ${{ inputs.tag }}
        run: |
          python - <<'PY'
          import os
          import tomllib

          expected = os.environ["TAG"].removeprefix("v")
          with open("pyproject.toml", "rb") as fh:
              actual = tomllib.load(fh)["project"]["version"]
          if actual != expected:
              raise SystemExit(f"pyproject version {actual} does not match release tag {expected}")
          PY

      - name: Build package artifacts
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
