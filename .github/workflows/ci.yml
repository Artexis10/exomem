name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Compatibility boundaries are sufficient here: 3.11 is the minimum
        # supported runtime and 3.13 is the newest. Testing the middle release
        # duplicated the full lean suite without expanding the support range.
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Verify lockfile is current
        run: uv lock --check
      - name: Run tests (lean — BM25/keyword, server media extraction off)
        env:
          # The suite runs without the embeddings/media extras; these mirror the
          # conftest autouse defaults so a forgotten extra can't change behaviour.
          KB_MCP_DISABLE_EMBEDDINGS: "1"
          KB_MCP_DISABLE_MEDIA_EXTRACTION: "1"
        run: uv run --frozen --python ${{ matrix.python-version }} python -m pytest -q
      - name: Sample vault smoke (the exact command users run)
        run: uv run --frozen --python ${{ matrix.python-version }} exomem demo --json

  product-e2e:
    name: product E2E (installed wheel, stdio + HTTP)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Governed lifecycle, restart persistence, and transport shutdown
        run: uv run --frozen python scripts/e2e_product_loop.py --budget-seconds 240 --request-timeout 20

  retrieval-eval:
    name: retrieval eval (golden gate, embeddings)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      # Cache the downloaded bge model between runs — the first run downloads
      # ~0.5 GB, later runs restore it so the gate stays fast. Keyed on the
      # model rev pinned in eval_retrieval.py so a model bump busts the cache.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-base-en-v1.5-reranker-base
      - name: Golden retrieval quality gate (hybrid ranking, live vectors)
        # Runs the embeddings-marked suite (tests/test_retrieval_golden.py):
        # builds the sidecar over the fixture KB and asserts hybrid NDCG@10 / MRR
        # / recall@10 clear their floors. Kept OFF the fast 3-version matrix so
        # lean CI never pays the torch download. EXOMEM_DISABLE_EMBEDDINGS is
        # deliberately unset here — the test lifts it and loads the real model.
        run: uv run --frozen --extra embeddings python -m pytest -m embeddings -v
      - name: Per-lane latency ceiling gate (2000-note synthetic vault, model-free)
        # The anti-"hidden 14s" gate (tests/test_latency_gate.py): generates a
        # realistic densely-wikilinked 2000-note vault and asserts NO retrieval
        # lane exceeds its ceiling (graph rebuild → ~1.9s trips it). Model-free,
        # so it ALSO runs in the lean matrix; pinned here as the benchmark gate's
        # home next to the golden quality gate.
        run: uv run --frozen python -m pytest tests/test_latency_gate.py -q

  onboarding:
    name: onboarding (wheel path)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Wheel-only time-to-value gate
        # Proves the onboarding path works from the built wheel alone — the
        # packaged sample vault ships, `exomem demo` has no repo dependency,
        # and `exomem setup --yes` completes — with a hard wall-time budget.
        run: uv run --frozen python scripts/time-to-value.py --budget-seconds 120

  docker:
    name: docker (lean build + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build lean image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: lean
          load: true
          tags: exomem:pr-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: In-container demo smoke (packaged sample vault, no mounts)
        run: docker run --rm exomem:pr-smoke demo --json
      - name: HTTP boot + claude.ai discovery-route smoke (dummy OAuth env, no GitHub calls)
        run: |
          trap 'docker rm -f exomem-smoke >/dev/null 2>&1 || true' EXIT
          mkdir -p /tmp/vault
          docker run --rm -v /tmp/vault:/vault exomem:pr-smoke init --vault /vault
          docker run -d --name exomem-smoke -p 8765:8765 \
            -v /tmp/vault:/vault -e EXOMEM_VAULT_PATH=/vault \
            -e EXOMEM_BASE_URL=http://127.0.0.1:8765 \
            -e GITHUB_CLIENT_ID=dummy -e GITHUB_CLIENT_SECRET=dummy \
            -e EXOMEM_GITHUB_USERNAME=dummy -e EXOMEM_GITHUB_USER_ID=1 \
            -e EXOMEM_JWT_SIGNING_KEY=dummy \
            exomem:pr-smoke
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8765/mcp || true)
            [ "$code" = "401" ] && break
            sleep 1
          done
          test "$code" = "401"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8765/.well-known/oauth-authorization-server)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8765/.well-known/oauth-protected-resource)" = "200"
          docker logs exomem-smoke | tail -5
          docker stop exomem-smoke

  specs:
    name: OpenSpec validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate specs
        run: npm exec --yes @fission-ai/openspec -- validate --specs --strict

  build:
    name: package build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build package
        run: uv build

  capabilities:
    name: capabilities doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Check generated capabilities doc
        run: uv run --frozen python scripts/generate-capabilities.py --check

  lint:
    name: lint + targeted types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Ruff correctness baseline (required)
        run: uvx ruff check . --select F
      - name: Full Ruff gate for new memory contracts
        run: >-
          uvx ruff check
          src/exomem/memory_refs.py
          src/exomem/observe_memory.py
          src/exomem/memory_context.py
          src/exomem/memory_schema.py
          src/exomem/relation_registry.py
          src/exomem/traversal_profiles.py
          src/exomem/epistemic_graph.py
          scripts/e2e_product_loop.py
          scripts/e2e_http_server.py
          scripts/smoke-media-pipeline.py
          tests/test_memory_refs.py
          tests/test_observe_memory.py
          tests/test_memory_schema.py
          tests/test_relation_registry.py
          tests/test_traversal_profiles.py
          --select E,F,I,B,UP,BLE
      - name: Targeted contract type check
        run: >-
          uvx mypy --follow-imports skip --ignore-missing-imports --check-untyped-defs
          src/exomem/memory_refs.py
          src/exomem/observe_memory.py
          src/exomem/memory_context.py
          src/exomem/memory_schema.py
          src/exomem/relation_registry.py
          src/exomem/traversal_profiles.py
          src/exomem/epistemic_graph.py
