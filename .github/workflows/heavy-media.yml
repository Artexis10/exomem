name: Heavy media E2E

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

jobs:
  media-e2e:
    name: real OCR, PDF, ASR, CLIP, and video
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Install system media engines
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr espeak ffmpeg
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Cache model downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: heavy-media-tiny-whisper-clip-v1
      - name: Run real media product smoke
        run: >-
          uv run --extra embeddings --extra media
          python scripts/smoke-media-pipeline.py --require-all
