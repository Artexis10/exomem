name: Publish hosted provisioner

on:
  push:
    branches: [main]
    paths:
      - "infra/provisioner/**"
      - "infra/helm/cell/**"
      - "infra/contracts/exomem-hosted-release-v1.json"
      - "infra/contracts/exomem-hosted-runtime-k3s-gate-v1.json"
      - "infra/contracts/substrate-gateway-contract-selection-v1.json"
      - "infra/scripts/verify_hosted_release.py"
      - "infra/scripts/verify_provisioner_image.py"
      - ".github/workflows/publish-hosted-provisioner.yml"
  workflow_dispatch:

concurrency:
  group: publish-hosted-provisioner-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish the source-bound provisioner image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: infra/provisioner/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/artexis10/exomem-provisioner:${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke the immutable published image
        env:
          PROVISIONER_IMAGE: ghcr.io/artexis10/exomem-provisioner@${{ steps.build.outputs.digest }}
        run: >-
          python3 infra/scripts/verify_provisioner_image.py
          --image "$PROVISIONER_IMAGE"
          --require-published
      - name: Prove the published runtime against the reviewed Substrate fixture
        run: |
          python3 infra/scripts/verify_hosted_release.py \
            --manifest infra/contracts/exomem-hosted-release-v1.json \
            --runtime-gate infra/contracts/exomem-hosted-runtime-k3s-gate-v1.json \
            --substrate-selection infra/contracts/substrate-gateway-contract-selection-v1.json \
            --fetch-substrate-fixture \
            --probe-image
      - name: Record the deploy input
        env:
          PROVISIONER_DIGEST: ${{ steps.build.outputs.digest }}
        run: >-
          echo "Provisioner image: ghcr.io/artexis10/exomem-provisioner@${PROVISIONER_DIGEST}"
          >> "$GITHUB_STEP_SUMMARY"
