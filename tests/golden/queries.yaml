    - "Knowledge Base/Notes/Research/Project Alpha/engine-architecture"

- query: "the ML educator known for the Software 3.0 framing and minimal-dependency engineering"
  expect_any_of:
    - "Knowledge Base/Entities/People/Ada Lovelace"

